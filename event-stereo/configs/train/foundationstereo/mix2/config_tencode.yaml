TOTAL_EPOCH: 10
LOG_INTERVAL: 1000
METHOD: base
DATASET:
  TRAIN:
    - NAME: nsd
      PATH: event-stereo/datasets/ev-nerfstereo-dataset-GEN3X2
      PARAMS:
        split: train
        sampling_ratio: 1
        width: 640
        height: 480
        crop_height: 448
        crop_width: 576
        event_cfg:
          NAME: sbn
          PARAMS:
            num_of_event: 500000
            stack_method: TencodeEventStacking
            stack_size: 3
            normalize: True
            #gamma: 0.5
            dropout_params:
              dropout_p: 0.5
              max_drop_count: 300000
              max_slice_size: 300000
              patch_size: 0
        disparity_cfg:
          NAME: base
          PARAMS: {
            curation_epe_threshold: 3.0,
           }
    - NAME: scannet
      PATH: event-stereo/datasets/ev-nerfstereo-scannet++-GEN3X
      PARAMS:
        split: train
        sampling_ratio: 1
        width: 640
        height: 480
        crop_height: 448
        crop_width: 576
        event_cfg:
          NAME: sbn
          PARAMS:
            num_of_event: 500000
            stack_method: TencodeEventStacking
            stack_size: 3
            normalize: True
            #gamma: 0.5
            dropout_params:
              dropout_p: 0.5
              max_drop_count: 300000
              max_slice_size: 300000
              patch_size: 0
        disparity_cfg:
          NAME: base
          PARAMS: { 
            use_mesh_depth: False,
            load_images: True,
            curation_epe_threshold: 4.0,
          }          
    - NAME: scannet
      PATH: event-stereo/datasets/ev-nerfstereo-scannet++-GEN4X
      PARAMS:
        split: train
        sampling_ratio: 1
        width: 1280
        height: 720
        crop_height: 448
        crop_width: 576
        event_cfg:
          NAME: sbn
          PARAMS:
            num_of_event: 500000
            stack_method: TencodeEventStacking
            stack_size: 3
            normalize: True
            #gamma: 0.5
            dropout_params:
              dropout_p: 0.5
              max_drop_count: 300000
              max_slice_size: 300000
              patch_size: 0
        disparity_cfg:
          NAME: base
          PARAMS: {
            use_mesh_depth: False,
            load_images: True,
            curation_epe_threshold: 6.0,
           }
  TEST:
    NAME: dsec
    PARAMS:
      split: validation
      sampling_ratio: 1
      crop_height: 480
      crop_width: 640
      event_cfg:
        NAME: sbn
        PARAMS:
          num_of_event: 500000
          stack_method: TencodeEventStacking
          stack_size: 3
          normalize: True
          #gamma: 0.5
      disparity_cfg:
        NAME: base
        PARAMS: { }
DATALOADER:
  TRAIN:
    NAME: get_simple_dataloader
    PARAMS:
      batch_size: 2
      shuffle: True
      drop_last: True
  TEST:
    NAME: get_sequence_dataloader
    PARAMS:
      batch_size: 1
      shuffle: False
      drop_last: False
MODEL:
  NAME: EventStereoMatchingNetwork
  PARAMS:
    backbone: FoundationStereo
    disparity_estimator:
      PARAMS:
        args:
          in_channels: 3
          vit_size: "vits"
          hidden_dims: [128, 128, 128]
          low_memory: False
          max_disp: 192
          corr_implementation: reg       
          n_downsample: 2
          corr_radius: 4
          corr_levels: 2
          n_gru_layers: 3
          slow_fast_gru: False
          tags_more: []
          tile_min_overlap: [16, 16]
          tile_wtype: gaussian
          wdecay: 0
          mixed_precision: False
          use_lora: False
          lora_r: 4
OPTIMIZER:
  NAME: AdamW
  PARAMS:
    lr: 0.00005
    weight_decay: 0.0001
SCHEDULER:
  NAME: OneCycleLR
  PARAMS:
    anneal_strategy: linear
    pct_start: 0.01